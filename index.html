<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A daily check-in app to help you reflect on your day">
    <title>yey-day - Daily Check-in</title>
    <style>
        /* CSS Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Mobile-first spacing */
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            
            /* Touch-friendly sizes */
            --button-size: 60px;
            --button-gap: 12px;
            
            /* Message area fixed height to prevent layout shift */
            --message-area-height: 80px;
            
            /* Colors */
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --text-color: #ffffff;
            --button-bg: rgba(255, 255, 255, 0.2);
            --button-hover: rgba(255, 255, 255, 0.3);
            --button-active: rgba(255, 255, 255, 0.4);
            --shadow: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-md);
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: var(--spacing-xl);
            line-height: 1.5;
        }

        .question {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            line-height: 1.4;
        }

        .emoji-buttons {
            display: flex;
            justify-content: center;
            gap: var(--button-gap);
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .emoji-button {
            /* Touch-friendly button size (min 44x44px recommended) */
            width: var(--button-size);
            height: var(--button-size);
            border: none;
            border-radius: 50%;
            background: var(--button-bg);
            backdrop-filter: blur(10px);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            /* Prevent text selection on tap */
            -webkit-user-select: none;
            user-select: none;
            /* Better tap handling on mobile */
            -webkit-tap-highlight-color: transparent;
        }

        .emoji-button:hover {
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--shadow);
        }

        .emoji-button:active {
            background: var(--button-active);
            transform: translateY(0);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .emoji-button:focus {
            outline: 3px solid rgba(255, 255, 255, 0.5);
            outline-offset: 2px;
        }

        /* Fixed height message area to prevent layout shift */
        .message-area {
            min-height: var(--message-area-height);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: var(--spacing-md);
        }

        .thank-you-message {
            font-size: 18px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: 16px;
            box-shadow: 0 4px 12px var(--shadow);
            /* Smooth entrance animation */
            animation: fadeInUp 0.4s ease-out;
            line-height: 1.5;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            margin-top: var(--spacing-xl);
            font-size: 14px;
            opacity: 0.7;
        }

        /* Tablet and larger screens */
        @media (min-width: 768px) {
            :root {
                --spacing-md: 20px;
                --spacing-lg: 32px;
                --spacing-xl: 48px;
                --button-size: 70px;
                --button-gap: 16px;
                --message-area-height: 100px;
            }

            h1 {
                font-size: 36px;
            }

            .subtitle {
                font-size: 18px;
            }

            .question {
                font-size: 24px;
            }

            .emoji-button {
                font-size: 32px;
            }

            .thank-you-message {
                font-size: 20px;
                padding: var(--spacing-lg) var(--spacing-xl);
            }

            .footer {
                font-size: 16px;
            }
        }

        /* Desktop and larger screens */
        @media (min-width: 1024px) {
            :root {
                --button-size: 80px;
                --button-gap: 20px;
            }

            h1 {
                font-size: 42px;
            }

            .emoji-button {
                font-size: 36px;
            }

            .emoji-button:hover {
                transform: translateY(-4px);
            }
        }

        /* Reduce motion for accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .emoji-button {
                border: 2px solid var(--text-color);
            }
        }

        /* Dark mode support (if needed in future) */
        @media (prefers-color-scheme: dark) {
            /* Already dark by default, but this is here for future enhancements */
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ yey-day</h1>
            <p class="subtitle">Your daily moment of reflection</p>
        </header>

        <main>
            <div class="question">How was your day?</div>
            
            <div class="emoji-buttons" role="group" aria-label="Rate your day">
                <button class="emoji-button" 
                        onclick="handleStatusClick('amazing')" 
                        aria-label="Amazing day"
                        type="button">
                    😄
                </button>
                <button class="emoji-button" 
                        onclick="handleStatusClick('good')" 
                        aria-label="Good day"
                        type="button">
                    🙂
                </button>
                <button class="emoji-button" 
                        onclick="handleStatusClick('okay')" 
                        aria-label="Okay day"
                        type="button">
                    😐
                </button>
                <button class="emoji-button" 
                        onclick="handleStatusClick('bad')" 
                        aria-label="Bad day"
                        type="button">
                    😔
                </button>
            </div>

            <!-- Fixed height area to prevent layout shift -->
            <div class="message-area" id="messageArea" role="status" aria-live="polite">
                <!-- Thank you message will appear here -->
            </div>
        </main>

        <footer class="footer">
            <p>Take a moment to reflect 💭</p>
        </footer>
    </div>

    <script>
        // Status messages for each emotion
        const statusMessages = {
            amazing: "That's wonderful! Keep that positive energy! 🌟",
            good: "Glad to hear it! Tomorrow will be great too! 🌈",
            okay: "That's okay! Every day is a new opportunity 🌱",
            bad: "Sorry to hear that. Tomorrow is a fresh start 🌅"
        };

        function handleStatusClick(status) {
            const messageArea = document.getElementById('messageArea');
            const message = statusMessages[status] || "Thanks for checking in! 💙";
            
            // Clear any existing message first
            messageArea.innerHTML = '';
            
            // Use a small delay to ensure smooth animation
            setTimeout(() => {
                messageArea.innerHTML = `<div class="thank-you-message">${message}</div>`;
            }, 50);
            
            // Store the status (could be used for future features like tracking)
            localStorage.setItem('lastCheckIn', JSON.stringify({
                status: status,
                date: new Date().toISOString()
            }));
            
            // Optional: Log for analytics (in a real app, you'd send this to a backend)
            console.log('Check-in recorded:', status);
        }

        // Optional: Check if user already checked in today
        function checkPreviousCheckIn() {
            const lastCheckIn = localStorage.getItem('lastCheckIn');
            if (lastCheckIn) {
                try {
                    const data = JSON.parse(lastCheckIn);
                    const lastDate = new Date(data.date);
                    const today = new Date();
                    
                    // If checked in today, show a welcome back message
                    if (lastDate.toDateString() === today.toDateString()) {
                        const messageArea = document.getElementById('messageArea');
                        messageArea.innerHTML = '<div class="thank-you-message">Welcome back! Feel free to update your check-in 🌟</div>';
                    }
                } catch (e) {
                    console.log('Could not parse previous check-in data');
                }
            }
        }

        // Check on page load
        document.addEventListener('DOMContentLoaded', checkPreviousCheckIn);
    </script>
</body>
</html>
