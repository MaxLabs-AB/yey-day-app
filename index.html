<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A daily check-in app to help you reflect on your day">
    <title>yey-day - Daily Check-in</title>
    <style>
        /* CSS Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Mobile-first spacing */
            --container-padding: 20px;
            --header-spacing: 24px;
            --button-size: 60px;
            --button-gap: 12px;
            --font-size-title: 24px;
            --font-size-subtitle: 14px;
            --font-size-question: 18px;
            --font-size-button: 32px;
            --font-size-message: 16px;
            --font-size-footer: 14px;
            
            /* Fixed height for message area to prevent layout shift */
            --message-area-min-height: 80px;
            
            /* Colors */
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --text-color: #ffffff;
            --button-bg: rgba(255, 255, 255, 0.2);
            --button-hover-bg: rgba(255, 255, 255, 0.3);
            --button-active-bg: rgba(255, 255, 255, 0.4);
            --backdrop-filter: blur(10px);
        }

        /* Tablet breakpoint */
        @media (min-width: 768px) {
            :root {
                --container-padding: 40px;
                --header-spacing: 32px;
                --button-size: 70px;
                --button-gap: 16px;
                --font-size-title: 32px;
                --font-size-subtitle: 16px;
                --font-size-question: 22px;
                --font-size-button: 36px;
                --font-size-message: 18px;
                --font-size-footer: 16px;
                --message-area-min-height: 90px;
            }
        }

        /* Desktop breakpoint */
        @media (min-width: 1024px) {
            :root {
                --container-padding: 60px;
                --header-spacing: 40px;
                --button-size: 80px;
                --button-gap: 20px;
                --font-size-title: 40px;
                --font-size-subtitle: 18px;
                --font-size-question: 24px;
                --font-size-button: 40px;
                --font-size-message: 20px;
                --message-area-min-height: 100px;
            }
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--container-padding);
            
            /* Prevent text selection and tap highlights on mobile */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .header {
            margin-bottom: var(--header-spacing);
        }

        h1 {
            font-size: var(--font-size-title);
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: var(--font-size-subtitle);
            opacity: 0.9;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .question {
            font-size: var(--font-size-question);
            font-weight: 600;
            opacity: 0.95;
            line-height: 1.4;
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--button-gap);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .status-button {
            width: var(--button-size);
            height: var(--button-size);
            min-width: var(--button-size);
            min-height: var(--button-size);
            font-size: var(--font-size-button);
            border: none;
            border-radius: 50%;
            background: var(--button-bg);
            backdrop-filter: var(--backdrop-filter);
            -webkit-backdrop-filter: var(--backdrop-filter);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            
            /* Better touch target */
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* Hover effect (desktop only) */
        @media (hover: hover) and (pointer: fine) {
            .status-button:hover {
                background: var(--button-hover-bg);
                transform: scale(1.1);
            }
        }

        .status-button:active {
            background: var(--button-active-bg);
            transform: scale(0.95);
        }

        .status-button:focus {
            outline: 3px solid rgba(255, 255, 255, 0.5);
            outline-offset: 4px;
        }

        .status-button:focus:not(:focus-visible) {
            outline: none;
        }

        /* Message area with FIXED minimum height to prevent layout shift */
        .message-area {
            min-height: var(--message-area-min-height);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .message {
            font-size: var(--font-size-message);
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .footer {
            margin-top: 32px;
            font-size: var(--font-size-footer);
            opacity: 0.7;
        }

        /* Accessibility: Reduce motion for users who prefer it */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            
            .status-button:hover,
            .status-button:active {
                transform: none;
            }
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .status-button {
                border: 2px solid var(--text-color);
            }
            
            .status-button:focus {
                outline: 3px solid var(--text-color);
            }
        }

        /* Screen reader only text */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>✨ yey-day</h1>
            <p class="subtitle">Your daily moment of reflection</p>
            <p class="question">How was your day?</p>
        </header>
        
        <main>
            <div class="button-container" role="group" aria-label="Rate your day">
                <button class="status-button" onclick="handleStatus('😄', 'amazing')" aria-label="Amazing day" type="button">
                    <span aria-hidden="true">😄</span>
                </button>
                <button class="status-button" onclick="handleStatus('🙂', 'good')" aria-label="Good day" type="button">
                    <span aria-hidden="true">🙂</span>
                </button>
                <button class="status-button" onclick="handleStatus('😐', 'okay')" aria-label="Okay day" type="button">
                    <span aria-hidden="true">😐</span>
                </button>
                <button class="status-button" onclick="handleStatus('😔', 'bad')" aria-label="Bad day" type="button">
                    <span aria-hidden="true">😔</span>
                </button>
            </div>
            
            <!-- Fixed height message area to prevent layout shift -->
            <div class="message-area" role="status" aria-live="polite">
                <p id="message" class="message"></p>
            </div>
        </main>

        <footer class="footer">
            <p>Take a moment to reflect 💭</p>
        </footer>
    </div>

    <script>
        function handleStatus(emoji, status) {
            try {
                const today = new Date().toDateString();
                const lastCheckIn = localStorage.getItem('lastCheckIn');
                const messageEl = document.getElementById('message');
                
                let message;
                
                if (lastCheckIn === today) {
                    message = `Welcome back! Your earlier check-in: ${emoji}`;
                } else {
                    message = `Thanks for checking in! ${emoji}`;
                    localStorage.setItem('lastCheckIn', today);
                    localStorage.setItem('lastStatus', emoji);
                }
                
                // Remove the show class to reset animation
                messageEl.classList.remove('show');
                
                // Force reflow to restart animation
                messageEl.offsetHeight;
                
                // Update message and show it
                messageEl.textContent = message;
                messageEl.classList.add('show');
            } catch (error) {
                // Fallback if localStorage fails
                console.warn('localStorage not available:', error);
                const messageEl = document.getElementById('message');
                messageEl.classList.remove('show');
                messageEl.offsetHeight;
                messageEl.textContent = `Thanks for checking in! ${emoji}`;
                messageEl.classList.add('show');
            }
        }

        // Check if user already checked in today on page load
        (function() {
            try {
                const today = new Date().toDateString();
                const lastCheckIn = localStorage.getItem('lastCheckIn');
                const lastStatus = localStorage.getItem('lastStatus');
                
                if (lastCheckIn === today && lastStatus) {
                    const messageEl = document.getElementById('message');
                    messageEl.textContent = `Welcome back! Your check-in today: ${lastStatus}`;
                    messageEl.classList.add('show');
                }
            } catch (error) {
                console.warn('localStorage not available:', error);
            }
        })();
    </script>
</body>
</html>
