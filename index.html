<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="yey-day - A daily check-in app to help you reflect on your day">
    <title>yey-day - How are you doing today?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #2d3748;
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .emoji-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            transition: opacity 0.3s ease;
        }

        .emoji-button {
            background: #f7fafc;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .emoji-button:hover {
            transform: scale(1.1);
            border-color: #667eea;
            background: #edf2f7;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .emoji-button:active {
            transform: scale(0.95);
        }

        .emoji-button.selected {
            background: #667eea;
            border-color: #667eea;
            animation: pulse 0.6s ease;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        .thank-you-message {
            margin-top: 30px;
            padding: 20px;
            background: #f0fff4;
            border: 2px solid #9ae6b4;
            border-radius: 12px;
            color: #22543d;
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s ease;
            display: none;
        }

        .thank-you-message.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .emoji-button {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }

            .emoji-buttons {
                gap: 15px;
            }

            .card {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>How are you doing today?</h1>
            <p class="subtitle">We'd love to know how you're feeling</p>
            
            <div class="emoji-buttons" id="emojiButtons">
                <button class="emoji-button" data-mood="very-happy" aria-label="Very happy" title="Very happy">
                    😄
                </button>
                <button class="emoji-button" data-mood="happy" aria-label="Happy" title="Happy">
                    😊
                </button>
                <button class="emoji-button" data-mood="neutral" aria-label="Neutral" title="Neutral">
                    😐
                </button>
                <button class="emoji-button" data-mood="sad" aria-label="Sad" title="Sad">
                    😔
                </button>
                <button class="emoji-button" data-mood="very-sad" aria-label="Very sad" title="Very sad">
                    😢
                </button>
            </div>

            <div class="thank-you-message" id="thankYouMessage">
                Thank you for sharing! We hope your day gets better! 💜
            </div>
        </div>
    </div>

    <script>
        // Get all emoji buttons and thank you message element
        const emojiButtons = document.querySelectorAll('.emoji-button');
        const thankYouMessage = document.getElementById('thankYouMessage');
        const emojiButtonsContainer = document.getElementById('emojiButtons');

        // Add click event listener to each button
        emojiButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove selected class from all buttons
                emojiButtons.forEach(btn => btn.classList.remove('selected'));
                
                // Add selected class to clicked button
                this.classList.add('selected');
                
                // Get the mood from data attribute
                const mood = this.getAttribute('data-mood');
                
                // Update thank you message based on mood
                updateThankYouMessage(mood);
                
                // Show thank you message
                thankYouMessage.classList.add('show');
                
                // Optional: Log the mood (could be used for analytics)
                console.log(`User selected mood: ${mood}`);
                
                // Hide the message after 5 seconds
                setTimeout(() => {
                    thankYouMessage.classList.remove('show');
                    // Remove selected class after message fades
                    setTimeout(() => {
                        this.classList.remove('selected');
                    }, 400);
                }, 5000);
            });
        });

        // Function to update thank you message based on mood
        function updateThankYouMessage(mood) {
            const messages = {
                'very-happy': 'That\'s wonderful! Keep spreading those positive vibes! 🌟',
                'happy': 'Great to hear! Have an amazing day! 😊',
                'neutral': 'Thank you for sharing. Hope your day improves! 💜',
                'sad': 'We\'re sorry to hear that. Tomorrow is a new day! 🌈',
                'very-sad': 'Thank you for sharing. Remember, this too shall pass. 💙'
            };
            
            thankYouMessage.textContent = messages[mood] || 'Thank you for sharing! 💜';
        }
    </script>
</body>
</html>
