<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yey-day // Daily Dev Check-in</title>
    <style>
        /* CSS Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #bc8cff;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .header h1::before {
            content: '// ';
            color: var(--text-muted);
            -webkit-text-fill-color: var(--text-muted);
        }

        .subtitle {
            color: var(--accent-green);
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
        }

        .subtitle::before {
            content: '> ';
            color: var(--text-muted);
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .card-header {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header::before {
            content: '// ';
            color: var(--text-muted);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.95em;
            font-family: 'Courier New', monospace;
        }

        .form-label::before {
            content: '// ';
            color: var(--text-muted);
        }

        .form-label.required::after {
            content: ' *';
            color: var(--accent-red);
        }

        /* Mood Selector */
        .mood-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .mood-option {
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .mood-option:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.2);
        }

        .mood-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .mood-option input[type="radio"]:checked ~ .mood-emoji {
            transform: scale(1.2);
        }

        .mood-option input[type="radio"]:checked ~ .mood-label {
            color: var(--accent-blue);
        }

        .mood-option.selected {
            border-color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.1);
        }

        .mood-emoji {
            font-size: 2.5em;
            display: block;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }

        .mood-label {
            font-size: 0.9em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Text Input & Textarea */
        input[type="text"],
        textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 1em;
            font-family: 'Courier New', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        input[type="text"]:invalid:not(:placeholder-shown),
        textarea:invalid:not(:placeholder-shown) {
            border-color: var(--accent-red);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }

        /* Validation Feedback */
        .validation-message {
            color: var(--accent-red);
            font-size: 0.85em;
            margin-top: 6px;
            font-family: 'Courier New', monospace;
            display: none;
        }

        .validation-message::before {
            content: '⚠ ';
        }

        .form-group.error .validation-message {
            display: block;
        }

        .form-group.error input[type="text"],
        .form-group.error textarea {
            border-color: var(--accent-red);
        }

        /* Button */
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px 28px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Courier New', monospace;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Success Message */
        .success-message {
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid var(--accent-green);
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: var(--accent-green);
            font-family: 'Courier New', monospace;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-message::before {
            content: '✓ ';
            font-weight: bold;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        /* History */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(4px);
            border-color: var(--accent-blue);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .history-date {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        .history-mood {
            font-size: 1.5em;
        }

        .history-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .history-notes {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
        }

        .empty-state::before {
            content: '📝';
            display: block;
            font-size: 3em;
            margin-bottom: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .mood-selector {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>yey-day</h1>
            <p class="subtitle">Daily Dev Check-in</p>
        </header>

        <div class="card">
            <div class="card-header">Today's Check-in</div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="checkinForm">
                <div class="form-group">
                    <label class="form-label required">How are you feeling?</label>
                    <div class="mood-selector">
                        <label class="mood-option">
                            <input type="radio" name="mood" value="great" id="mood-great" required>
                            <span class="mood-emoji">🚀</span>
                            <span class="mood-label">Great</span>
                        </label>
                        <label class="mood-option">
                            <input type="radio" name="mood" value="good" id="mood-good" required>
                            <span class="mood-emoji">😊</span>
                            <span class="mood-label">Good</span>
                        </label>
                        <label class="mood-option">
                            <input type="radio" name="mood" value="okay" id="mood-okay" required>
                            <span class="mood-emoji">😐</span>
                            <span class="mood-label">Okay</span>
                        </label>
                        <label class="mood-option">
                            <input type="radio" name="mood" value="tough" id="mood-tough" required>
                            <span class="mood-emoji">😓</span>
                            <span class="mood-label">Tough</span>
                        </label>
                        <label class="mood-option">
                            <input type="radio" name="mood" value="struggling" id="mood-struggling" required>
                            <span class="mood-emoji">😰</span>
                            <span class="mood-label">Struggling</span>
                        </label>
                    </div>
                    <div class="validation-message">Please select your mood</div>
                </div>

                <div class="form-group">
                    <label for="title" class="form-label required">What's on your mind?</label>
                    <input 
                        type="text" 
                        id="title" 
                        name="title" 
                        placeholder="E.g., Fixed critical bug, Started new feature..."
                        required
                        maxlength="200"
                    >
                    <div class="validation-message">Please enter a title</div>
                </div>

                <div class="form-group">
                    <label for="notes" class="form-label">Additional notes (optional)</label>
                    <textarea 
                        id="notes" 
                        name="notes" 
                        placeholder="Share more details, challenges, or wins..."
                        maxlength="1000"
                    ></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Check-in</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">Your Stats</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-label">Day Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalCheckins">0</div>
                    <div class="stat-label">Total Check-ins</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">History</div>
            <div id="historyList" class="history-list">
                <div class="empty-state">No check-ins yet. Start your journey today!</div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'yeyDayCheckins';
        const OLD_STORAGE_KEY = 'yey-day-checkins';
        const MOOD_EMOJIS = {
            great: '🚀',
            good: '😊',
            okay: '😐',
            tough: '😓',
            struggling: '😰'
        };

        // Data migration from old format
        function migrateOldData() {
            const oldData = localStorage.getItem(OLD_STORAGE_KEY);
            const newData = localStorage.getItem(STORAGE_KEY);
            
            // Only migrate if old data exists and new data doesn't
            if (oldData && !newData) {
                try {
                    const parsed = JSON.parse(oldData);
                    const migratedCheckins = [];
                    
                    // Old format: {"2024-01-15": {status: "good", emoji: "😊", timestamp: 123456}}
                    // New format: [{date: "2024-01-15", mood: "good", title: "", notes: "", timestamp: 123456}]
                    for (const [date, data] of Object.entries(parsed)) {
                        migratedCheckins.push({
                            date: date,
                            mood: data.status || 'okay',
                            title: 'Migrated check-in',
                            notes: '',
                            timestamp: data.timestamp || new Date(date).getTime()
                        });
                    }
                    
                    // Sort by date (oldest first)
                    migratedCheckins.sort((a, b) => a.timestamp - b.timestamp);
                    
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(migratedCheckins));
                    console.log('Data migrated successfully from old format');
                } catch (e) {
                    console.error('Error migrating old data:', e);
                }
            }
        }

        // HTML escape function to prevent XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Load check-ins from storage
        function loadCheckins() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // Save check-ins to storage
        function saveCheckins(checkins) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(checkins));
        }

        // Get today's date in YYYY-MM-DD format
        function getTodayDate() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        // Check if user has already checked in today
        function hasCheckedInToday(checkins) {
            const today = getTodayDate();
            return checkins.some(checkin => checkin.date === today);
        }

        // Calculate current streak
        function calculateStreak(checkins) {
            if (checkins.length === 0) return 0;

            // Sort by date descending
            const sorted = [...checkins].sort((a, b) => 
                new Date(b.date) - new Date(a.date)
            );

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let streak = 0;
            let currentDate = new Date(today);

            for (const checkin of sorted) {
                const checkinDate = new Date(checkin.date);
                checkinDate.setHours(0, 0, 0, 0);
                
                const diffDays = Math.floor((currentDate - checkinDate) / (1000 * 60 * 60 * 24));
                
                // Check if this checkin matches the expected date in the streak
                if (diffDays === streak) {
                    streak++;
                    currentDate.setDate(currentDate.getDate() - 1);
                } else if (diffDays > streak) {
                    // Gap in streak, stop counting
                    break;
                }
            }

            return streak;
        }

        // Update stats display
        function updateStats() {
            const checkins = loadCheckins();
            const streak = calculateStreak(checkins);
            const total = checkins.length;

            document.getElementById('currentStreak').textContent = streak;
            document.getElementById('totalCheckins').textContent = total;
        }

        // Render history
        function renderHistory() {
            const checkins = loadCheckins();
            const historyList = document.getElementById('historyList');

            if (checkins.length === 0) {
                historyList.innerHTML = '<div class="empty-state">No check-ins yet. Start your journey today!</div>';
                return;
            }

            // Sort by date descending (most recent first)
            const sorted = [...checkins].sort((a, b) => 
                new Date(b.date) - new Date(a.date)
            );

            historyList.innerHTML = sorted.map(checkin => {
                const emoji = MOOD_EMOJIS[checkin.mood] || '😐';
                const date = new Date(checkin.date).toLocaleDateString('en-US', {
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
                
                // Escape user input to prevent XSS
                const safeTitle = escapeHtml(checkin.title);
                const safeNotes = escapeHtml(checkin.notes);

                return `
                    <div class="history-item">
                        <div class="history-header">
                            <span class="history-date">${date}</span>
                            <span class="history-mood">${emoji}</span>
                        </div>
                        <div class="history-title">${safeTitle}</div>
                        ${safeNotes ? `<div class="history-notes">${safeNotes}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Show success message
        function showSuccess(message) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = message;
            successMsg.classList.add('show');
            
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 5000);
        }

        // Validate form
        function validateForm(formData) {
            let isValid = true;
            const form = document.getElementById('checkinForm');

            // Validate mood
            const moodGroup = form.querySelector('.form-group');
            if (!formData.get('mood')) {
                moodGroup.classList.add('error');
                isValid = false;
            } else {
                moodGroup.classList.remove('error');
            }

            // Validate title
            const titleGroup = form.querySelectorAll('.form-group')[1];
            if (!formData.get('title') || formData.get('title').trim() === '') {
                titleGroup.classList.add('error');
                isValid = false;
            } else {
                titleGroup.classList.remove('error');
            }

            return isValid;
        }

        // Handle form submission
        document.getElementById('checkinForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(e.target);
            
            // Validate form
            if (!validateForm(formData)) {
                return;
            }

            const checkins = loadCheckins();
            const today = getTodayDate();

            // Check if already checked in today
            if (hasCheckedInToday(checkins)) {
                if (!confirm('You have already checked in today. Do you want to add another entry?')) {
                    return;
                }
            }

            const newCheckin = {
                date: today,
                mood: formData.get('mood'),
                title: formData.get('title').trim(),
                notes: formData.get('notes').trim(),
                timestamp: Date.now()
            };

            checkins.push(newCheckin);
            saveCheckins(checkins);

            // Reset form
            e.target.reset();
            document.querySelectorAll('.mood-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelectorAll('.form-group').forEach(group => {
                group.classList.remove('error');
            });

            // Update UI
            updateStats();
            renderHistory();
            showSuccess('Check-in saved successfully!');
        });

        // Handle mood selection visual feedback
        document.querySelectorAll('.mood-option input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.mood-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                if (this.checked) {
                    this.closest('.mood-option').classList.add('selected');
                }
            });
        });

        // Remove validation error on input
        document.getElementById('title').addEventListener('input', function() {
            if (this.value.trim()) {
                this.closest('.form-group').classList.remove('error');
            }
        });

        // Initialize app
        function init() {
            // Migrate old data if exists
            migrateOldData();
            
            // Load and display data
            updateStats();
            renderHistory();
        }

        // Run initialization when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
